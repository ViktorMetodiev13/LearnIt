<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnIt</title>

    <link rel="stylesheet" href="./styles/style.css">
</head>

<body>

    <!-- Login Page ( Only for Guest users ) -->
    <div class="login-page">
        <div class="form">
            <h1>Have an Account?</h1>
            <form class="login-form">
                <input type="text" name="username" placeholder="username" />
                <input type="password" name="password" placeholder="password" />
                <button>Sign in</button>
                <p class="message">Not registered? <a href="#">Create an account</a></p>
            </form>
        </div>
    </div>

    <!-- Register Page ( Only for Guest users ) -->
    <div class="register-page">
        <div class="form">
            <h1>Create Your Account</h1>
            <form class="login-form">
                <input type="text" name="username" placeholder="username" />
                <input type="password" name="password" placeholder="password" />
                <input type="password" name="repass" placeholder="confirm password" />
                <button>Sign Up</button>
                <p class="message">Already registered? <a href="#">Sign In</a></p>
            </form>
        </div>
    </div>

    <!-- Create Page ( Only for logged-in users ) -->
    <section id="create-page" class="auth">
        <div class="form">
            <h1>Create Course</h1>
            <form class="login-form">
                <input type="text" id="title" name="title" placeholder="Course Name">
                <input type="text" id="category" name="category" placeholder="Enter course category">
                <input type="number" id="maxLevel" name="maxLevel" min="1" placeholder="Number of weeks">
                <input type="text" id="imageUrl" name="imageUrl" placeholder="Upload a photo">
                <textarea name="description" id="description" placeholder="Course description"></textarea>
                <button>Create Course</button>
            </form>
        </div>
    </section>

    <!-- Edit Page ( Only for the creator )-->
    <section id="edit-page" class="auth">
        <div class="form">
            <h1>Edit Course</h1>
            <form class="login-form">
                <input type="text" id="title" name="title" placeholder="Course Name">
                <input type="text" id="category" name="category" placeholder="Enter course category">
                <input type="number" id="maxLevel" name="maxLevel" min="1" placeholder="Number of weeks">
                <input type="text" id="imageUrl" name="imageUrl" placeholder="Upload a photo">
                <textarea id="description" name="description" placeholder="Course description"></textarea>
                <button>Edit Course</button>
            </form>
        </div>
    </section>
</body>

</html>
